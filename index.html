<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Menu System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#1f2937,#111827);
    padding:30px;
}
.container{
    max-width:1100px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
}
select,input,button{
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
}
button{
    background:#2563eb;
    color:white;
    cursor:pointer;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #eee;
}
th{background:#f3f4f6;}
.total{
    text-align:right;
    margin-top:15px;
    font-weight:600;
}

.date-section {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin-bottom: 20px;
}

.date-section div {
    flex: 1;
    min-width: 200px;
}
</style>
</head>

<body>

<div class="container" id="content">

<div class="header">
    <h1><u>ANJUMAN-E-FATEMI</u></h1>
    <h2><u>FAIZ AL MAWAID AL BURHANIYAH</u></h2>
</div>

<div class="date-section">
    <div>
        <label>Hijri Date</label>
        <input type="text" placeholder="Enter Hijri Date">
    </div>
    <div>
        <label>English Date</label>
        <input type="date">
    </div>
    <div>
        <label>Day</label>
        <input type="text" placeholder="Friday">
    </div>
</div>

<br>

<div>
        <label>MENU :  </label>
        <input type="text" placeholder="">
    </div>
<br><br>

<input list="itemsList" id="itemInput" 
       placeholder="Type Item Name" 
       oninput="autoFill()">
	   
<datalist id="itemsList"></datalist>

<input type="number" id="price" placeholder="Price">
<input type="text" id="unit" placeholder="Unit">
<input type="number" id="quantity" placeholder="Quantity">

<button onclick="addItem()">Add Item</button>
<button onclick="exportPDF()">Export PDF</button>

<table id="menuTable">
<thead>
<tr>
<th>Sr</th>
<th>Item</th>
<th>Price</th>
<th>Unit</th>
<th>Qty</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="total">
Grand Total: ₹ <span id="grandTotal">0</span>
</div>

</div>

<script>

let itemsData = [];
let serial = 1;
let grandTotal = 0;

/* ---------------- AUTO LOAD EXCEL ---------------- */

window.onload = function() {
    fetch('ITEMLIST_MADAR.xlsx')
    .then(response => response.arrayBuffer())
    .then(data => {
        let workbook = XLSX.read(data, {type:'array'});
        let sheet = workbook.Sheets[workbook.SheetNames[0]];
        itemsData = XLSX.utils.sheet_to_json(sheet);
        loadDropdown();
    })
    .catch(error => {
        console.error("Error loading Excel:", error);
        alert("Unable to load items.xlsx file.");
    });
};

/* ---------------- LOAD DROPDOWN ---------------- */

function loadDropdown(){
    let dropdown = document.getElementById("itemDropdown");
    dropdown.innerHTML = '<option value="">Select Item</option>';

    itemsData.forEach((item,index)=>{
        dropdown.innerHTML += 
        '<option value="${index}">${item["Item Name"]}</option>';
    });
}

/* ---------------- AUTO FILL ---------------- */

function autoFill(){
    let selectedName = document.getElementById("itemInput").value;

    let item = itemsData.find(i => i["Item Name"] === selectedName);

    if(!item) return;

    document.getElementById("price").value = item["Price"];
    document.getElementById("unit").value = item["Unit"];
}

function loadDropdown(){
    let datalist = document.getElementById("itemsList");
    datalist.innerHTML = "";

    itemsData.forEach((item)=>{
        datalist.innerHTML += 
        `<option value="${item["Item Name"]}">`;
    });
}

/* ---------------- ADD ITEM ---------------- */

function addItem(){
    let selectedName = document.getElementById("itemInput").value;
	let item = itemsData.find(i => i["Item Name"] === selectedName);

	if(!item){
		alert("Please select valid item from list");
		return;
	}
    let qty = parseFloat(document.getElementById("quantity").value);
	let price = parseFloat(document.getElementById("price").value);
	let unit = parseFloat(document.getElementById("unit").value);
	
    let total = price * qty;
    grandTotal += total;

    let table = document.querySelector("#menuTable tbody");
    let row = table.insertRow();

    row.innerHTML = `
    <td>${serial++}</td>
    <td>${item["Item Name"]}</td>
    <td>${price}</td>
    <td>${unit}</td>
    <td>${qty}</td>
    <td>${total}</td>
    <td><button onclick="deleteRow(this,${total})">Delete</button></td>
    `;

    document.getElementById("grandTotal").innerText = grandTotal;
    document.getElementById("quantity").value="";
}

/* ---------------- DELETE ---------------- */

function deleteRow(btn,total){
    btn.closest("tr").remove();
    grandTotal -= total;
    document.getElementById("grandTotal").innerText = grandTotal;
}

async function exportPDF(){

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');

    let today = new Date();
    let formattedDate = today.toLocaleDateString('en-IN');

    // ---- HEADER SECTION ----
    doc.setFontSize(18);
    doc.setFont("helvetica", "bold");
    doc.text("ANJUMAN-E-FATEMI", 105, 20, { align: "center" });

    doc.setFontSize(14);
    doc.text("FAIZ AL MAWAID AL BURHANIYAH", 105, 28, { align: "center" });


    // ---- LOGO (Optional) ----
    // If you have logo.png in repo, uncomment this:

    
    let leftImg = new Image();
	let rightImg = new Image();
    
	leftImg.src = "FTNLogo.png";
	rightImg.src = "FMBLogo.png";
	
    doc.addImage(leftImg, "PNG", 14, 15, 25, 20);
    doc.addImage(rightImg, "PNG", 170, 10, 25, 25);

    // ---- TABLE DATA ----
    let rows = document.querySelectorAll("#menuTable tbody tr");
    let tableData = [];

    rows.forEach(row => {
        tableData.push([
            row.cells[0].innerText,
            row.cells[1].innerText,
            row.cells[2].innerText,
            row.cells[3].innerText,
            row.cells[4].innerText,
            row.cells[5].innerText
        ]);
    });

    doc.autoTable({
        startY: 50,
        head: [["Sr", "Item", "Price", "Unit", "Qty", "Total"]],
        body: tableData,
        theme: "grid",
        headStyles: {
            fillColor: [230, 230, 230],
            textColor: 0,
            fontStyle: 'bold'
        },
        styles: {
            fontSize: 10
        }
    });

    // ---- GRAND TOTAL SECTION ----
   let finalY = doc.lastAutoTable.finalY + 10;

    doc.setFillColor(255, 255, 0); // Yellow full row
    doc.rect(14, finalY, 182, 12, "F");

    doc.setFontSize(14);
    doc.setFont("helvetica", "bold");

    doc.text(
        "GRAND TOTAL : " + grandTotal,
        105,
        finalY + 8,
        { align: "center" }
    );

    // ---- SIGNATURE SECTION ----
    finalY += 25;

    doc.setFontSize(11);
    doc.setFont("helvetica", "normal");

    doc.save("Faiz_Menu_Report.pdf");
}

function formatINR(amount) {
    return new Intl.NumberFormat('en-IN', {
        style: 'currency',
        currency: 'INR',
        minimumFractionDigits: 2
    }).format(amount);
}

</script>

</body>
</html>
